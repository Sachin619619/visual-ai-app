<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: auto; }
    #root { width: 100%; min-height: 100%; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    window.addEventListener('message', function(event) {
      if (!event.data) return;
      if (event.data.type === 'SET_CONTENT') {
        document.open();
        document.write(event.data.html);
        document.close();
      } else if (event.data.type === 'PING_READY') {
        // Parent is asking if we're ready — echo back RENDERER_READY
        try { window.parent.postMessage({ type: 'RENDERER_READY' }, '*'); } catch(e) {}
      }
    });
    // Signal parent that renderer is ready on initial load
    try { window.parent.postMessage({ type: 'RENDERER_READY' }, '*'); } catch(e) {}
  </script>
</body>
</html>
