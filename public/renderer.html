<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: auto; }
    #root { width: 100%; min-height: 100%; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    window.addEventListener('message', function(event) {
      if (!event.data || event.data.type !== 'SET_CONTENT') return;
      var html = event.data.html;
      // Replace the entire document with the received HTML
      document.open();
      document.write(html);
      document.close();
    });
    // Signal parent that renderer is ready
    window.parent.postMessage({ type: 'RENDERER_READY' }, '*');
  </script>
</body>
</html>
